<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mary ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #030002;
            --primary-glow: #ff1e56;
            --neon-cyan: #ff007f;
            --glass-card: rgba(10, 2, 7, 0.45);
            --glass-border: rgba(255, 30, 86, 0.25);
            --text-main: #ffffff;
            --text-sub: #ffb8c6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Alexandria', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* تأثير أضواء الشفق القطبي الفاخر في الخلفية (Aurora Mesh) */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            z-index: -4;
            background: radial-gradient(circle at 30% 30%, rgba(255, 30, 86, 0.12), transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(158, 0, 43, 0.15), transparent 45%),
                        radial-gradient(circle at 50% 10%, rgba(255, 0, 127, 0.08), transparent 35%);
            animation: auroraGlow 25s linear infinite;
        }
        @keyframes auroraGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* زر الصوت العائم المتحرك */
        .audio-container {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
        }
        .audio-btn {
            background: rgba(255, 30, 86, 0.1);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 30, 86, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .audio-btn:hover {
            transform: scale(1.1) rotate(15deg);
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -3;
            overflow: hidden;
            pointer-events: none;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.28;
            filter: contrast(1.1) brightness(0.9);
        }
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle, transparent 20%, rgba(3,0,2,0.98) 95%);
            pointer-events: none;
        }

        #hearts-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            opacity: 0;
            font-size: var(--h-size);
            animation: moveUpwards var(--h-duration) linear infinite;
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }
        @keyframes moveUpwards {
            0% { transform: translateY(105vh) translateX(0) scale(0.6) rotate(0deg); opacity: 0; }
            20% { opacity: var(--h-opacity); transform: translateY(75vh) translateX(15px) scale(1.1); }
            80% { opacity: var(--h-opacity); }
            100% { transform: translateY(-10vh) translateX(var(--h-drift)) scale(0.6) rotate(360deg); opacity: 0; }
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            position: relative;
            z-index: 10;
        }

        /* كارت النيون الزجاجي العملاق والمطور (Cyber Glassmorphism) */
        .ultra-card {
            width: 100%;
            max-width: 1100px;
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.75), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2),
                        0 0 40px rgba(255, 30, 86, 0.05);
            display: grid;
            grid-template-columns: 1.25fr 1fr;
            overflow: hidden;
            position: relative;
        }

        /* خط النيون المتوهج المتحرك في أعلى وأسفل الكارت */
        .ultra-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-glow), var(--neon-cyan), transparent);
            animation: borderGlow 6s linear infinite;
        }
        @keyframes borderGlow {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .content-side {
